<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travel Track – Ma Position</title>
  <meta name="description" content="Géolocalisation GPS en temps réel avec suivi continu et historique." />

  <!-- Leaflet (local, pas de CDN) -->
  <link rel="stylesheet" href="Front/leaflet.css" />

  <!-- Styles du projet -->
  <link rel="stylesheet" href="Front/styles.css" />
</head>
<body>

<div class="app">

  <!-- ══ SIDEBAR ══ -->
  <aside class="sidebar">

    <!-- En-tête -->
    <div class="sidebar-header">
      <div class="sidebar-logo">🌍</div>
      <div>
        <h1>Travel Track</h1>
        <p>Géolocalisation en temps réel</p>
      </div>
      <div class="status-dot idle" id="statusDot"></div>
    </div>

    <!-- Actions -->
    <button class="btn btn-primary" id="btnLocate">
      <span>📍</span> Localiser ma position
    </button>

    <button class="btn btn-ghost hidden" id="btnWatch">
      <span id="watchIcon">👁️</span>
      <span id="watchLabel">Suivi continu</span>
    </button>

    <!-- Erreur -->
    <div class="error-box" id="errorBox"></div>

    <!-- Coordonnées GPS -->
    <div class="card hidden" id="cardCoords">
      <div class="card-label">📌 Coordonnées GPS</div>
      <div class="data-grid">
        <div class="data-item">
          <span class="data-key">Latitude</span>
          <span class="data-val" id="lat">—</span>
        </div>
        <div class="data-item">
          <span class="data-key">Longitude</span>
          <span class="data-val" id="lng">—</span>
        </div>
        <div class="data-item">
          <span class="data-key">Altitude</span>
          <span class="data-val" id="alt">—</span>
        </div>
        <div class="data-item">
          <span class="data-key">Précision</span>
          <span class="data-val" id="acc">—</span>
        </div>
      </div>
    </div>

    <!-- Vitesse & Cap -->
    <div class="card hidden" id="cardSpeed">
      <div class="card-label">🚀 Vitesse & Cap</div>
      <div class="data-grid">
        <div class="data-item">
          <span class="data-key">Vitesse</span>
          <span class="data-val" id="speed">—</span>
        </div>
        <div class="data-item">
          <span class="data-key">Cap</span>
          <span class="data-val" id="heading">—</span>
        </div>
      </div>
    </div>

    <!-- Horodatage -->
    <div class="card hidden" id="cardTime">
      <div class="card-label">🕐 Horodatage</div>
      <div class="timestamp-val" id="timestamp">—</div>
      <div class="timestamp-ago" id="timestampAgo"></div>
    </div>

    <!-- Historique -->
    <div id="historySection" class="hidden">
      <div class="card-label history-title">🗂️ Historique</div>
      <ul class="history-list" id="historyList"></ul>
    </div>

  </aside>

  <!-- ══ CARTE ══ -->
  <div class="map-wrapper">
    <div id="map"></div>

    <!-- Overlay : état initial -->
    <div id="map-overlay">
      <div class="overlay-inner">
        <div class="icon">🗺️</div>
        <p>Cliquez sur <strong>Localiser</strong> pour afficher la carte</p>
      </div>
    </div>

    <!-- Overlay : chargement -->
    <div id="loader-overlay">
      <div class="spinner"></div>
    </div>
  </div>

</div>

<!-- Leaflet JS (local) -->
<script src="Front/leaflet.js"></script>

<script>
  // ═══════════════════════════════════════════
  //  TRAVEL TRACK — Géolocalisation vanilla JS
  //  Pas de dépendances, pas de build tool.
  // ═══════════════════════════════════════════

  /* Fix icônes Leaflet en local */
  L.Icon.Default.prototype.options.iconUrl       = 'Front/images/marker-icon.png';
  L.Icon.Default.prototype.options.iconRetinaUrl = 'Front/images/marker-icon-2x.png';
  L.Icon.Default.prototype.options.shadowUrl     = 'Front/images/marker-shadow.png';
  delete L.Icon.Default.prototype._getIconUrl;

  // ─── Raccourci DOM ───────────────────────
  const $ = id => document.getElementById(id);

  // ─── Références éléments ─────────────────
  const btnLocate     = $('btnLocate');
  const btnWatch      = $('btnWatch');
  const watchLabel    = $('watchLabel');
  const watchIcon     = $('watchIcon');
  const statusDot     = $('statusDot');
  const errorBox      = $('errorBox');
  const mapOverlay    = $('map-overlay');
  const loaderOverlay = $('loader-overlay');

  // ─── État ────────────────────────────────
  let map, marker, accuracyCircle;
  let watchId    = null;
  let isWatching = false;
  let posHistory = [];

  // ─── Initialiser la carte ────────────────
  function initMap(lat, lng) {
    if (!map) {
      map = L.map('map', {
        center: [lat, lng],
        zoom: 15,
        zoomAnimation: true,
        zoomAnimationThreshold: 4,
        fadeAnimation: true,
        markerZoomAnimation: true,
        zoomSnap: 1,
        zoomDelta: 1,
        wheelPxPerZoomLevel: 120,
        preferCanvas: true
      });

      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
        subdomains: 'abcd',
        maxZoom: 19,
        keepBuffer: 6,
        updateWhenZooming: false
      }).addTo(map);
    } else {
      map.flyTo([lat, lng], 15, { duration: 1.4 });
    }
  }

  // ─── Icône personnalisée ─────────────────
  function makeIcon() {
    return L.divIcon({
      className: '',
      html: `<div style="
        width:18px; height:18px; border-radius:50%;
        background:#58a6ff;
        border:3px solid #fff;
        box-shadow:0 0 0 5px rgba(88,166,255,.35), 0 2px 10px rgba(0,0,0,.6);
      "></div>`,
      iconSize: [18, 18],
      iconAnchor: [9, 9]
    });
  }

  // ─── Poser / déplacer le marqueur ────────
  function placeMarker(lat, lng, accuracy) {
    if (marker) {
      marker.setLatLng([lat, lng]);
      if (accuracyCircle) accuracyCircle.setLatLng([lat, lng]).setRadius(accuracy);
    } else {
      marker = L.marker([lat, lng], { icon: makeIcon() })
        .addTo(map)
        .bindPopup('<strong>📍 Vous êtes ici</strong>')
        .openPopup();

      if (accuracy && accuracy < 5000) {
        accuracyCircle = L.circle([lat, lng], {
          radius: accuracy,
          className: 'accuracy-ring',
          interactive: false
        }).addTo(map);
      }
    }
  }

  // ─── Afficher une position ────────────────
  function afficherPosition(pos) {
    const { latitude, longitude, altitude, accuracy, speed, heading } = pos.coords;
    const ts = new Date(pos.timestamp);

    // Masquer overlays
    mapOverlay.classList.add('hidden');
    loaderOverlay.classList.remove('visible');

    setStatus('ok');

    // Carte
    initMap(latitude, longitude);
    placeMarker(latitude, longitude, accuracy);

    // Données
    $('lat').textContent     = latitude.toFixed(6) + '°';
    $('lng').textContent     = longitude.toFixed(6) + '°';
    $('alt').textContent     = altitude != null ? Math.round(altitude) + ' m' : '—';
    $('acc').textContent     = '±' + Math.round(accuracy) + ' m';
    $('speed').textContent   = speed   != null ? (speed * 3.6).toFixed(1) + ' km/h' : '—';
    $('heading').textContent = heading != null ? Math.round(heading) + '°' : '—';

    $('timestamp').textContent  = ts.toLocaleString('fr-FR');
    $('timestampAgo').textContent = 'Il y a ' + depuisCombien(ts);

    // Afficher les cards
    ['cardCoords', 'cardSpeed', 'cardTime', 'historySection', 'btnWatch'].forEach(id => {
      $(id).classList.remove('hidden');
    });

    // Historique
    ajouterHistorique(latitude, longitude, ts);
    masquerErreur();
  }

  // ─── Historique ──────────────────────────
  function ajouterHistorique(lat, lng, ts) {
    posHistory.unshift({ lat, lng, ts });
    if (posHistory.length > 10) posHistory.pop();

    const list = $('historyList');
    list.innerHTML = '';

    posHistory.forEach(item => {
      const li = document.createElement('li');
      li.className = 'history-item';
      li.innerHTML = `
        <span>${item.lat.toFixed(4)}°, ${item.lng.toFixed(4)}°</span>
        <span class="h-time">${item.ts.toLocaleTimeString('fr-FR')}</span>`;
      li.addEventListener('click', () => map && map.setView([item.lat, item.lng], 16));
      list.appendChild(li);
    });
  }

  // ─── Utilitaires ─────────────────────────
  function depuisCombien(date) {
    const s = Math.round((Date.now() - date.getTime()) / 1000);
    if (s < 60)   return s + 's';
    if (s < 3600) return Math.round(s / 60) + ' min';
    return Math.round(s / 3600) + 'h';
  }

  function setStatus(etat) { // 'idle' | 'loading' | 'ok' | 'error'
    statusDot.className = 'status-dot ' + etat;
  }

  function afficherErreur(msg) {
    errorBox.textContent = '⚠️ ' + msg;
    errorBox.classList.add('visible');
    loaderOverlay.classList.remove('visible');
    setStatus('error');
    btnLocate.disabled = false;
  }

  function masquerErreur() {
    errorBox.classList.remove('visible');
  }

  // ─── Erreurs géolocalisation ─────────────
  function gererErreur(err) {
    const msgs = {
      1: "Permission refusée. Autorisez la géolocalisation dans le navigateur.",
      2: "Position introuvable. Vérifiez GPS ou connexion.",
      3: "Délai dépassé. Réessayez."
    };
    afficherErreur(msgs[err.code] || "Erreur inconnue.");
  }

  // ─── Options API Geolocation ──────────────
  const GEO_OPTS = {
    enableHighAccuracy: true,
    timeout: 10000,
    maximumAge: 0
  };

  // ─── Bouton Localiser ─────────────────────
  btnLocate.addEventListener('click', () => {
    if (!navigator.geolocation) {
      afficherErreur("La géolocalisation n'est pas supportée par ce navigateur.");
      return;
    }

    setStatus('loading');
    btnLocate.disabled = true;
    loaderOverlay.classList.add('visible');

    navigator.geolocation.getCurrentPosition(
      pos => {
        afficherPosition(pos);
        btnLocate.disabled = false;
      },
      err => gererErreur(err),
      GEO_OPTS
    );
  });

  // ─── Bouton Suivi continu ─────────────────
  btnWatch.addEventListener('click', () => {
    if (!isWatching) {
      watchId = navigator.geolocation.watchPosition(afficherPosition, gererErreur, GEO_OPTS);
      isWatching = true;
      watchLabel.textContent = 'Arrêter le suivi';
      watchIcon.textContent  = '⏹️';
      btnWatch.classList.add('active');
    } else {
      navigator.geolocation.clearWatch(watchId);
      isWatching = false;
      watchId    = null;
      watchLabel.textContent = 'Suivi continu';
      watchIcon.textContent  = '👁️';
      btnWatch.classList.remove('active');
      setStatus('idle');
    }
  });

  // Mise à jour "il y a X" toutes les 15s
  setInterval(() => {
    if (posHistory.length > 0) {
      $('timestampAgo').textContent = 'Il y a ' + depuisCombien(posHistory[0].ts);
    }
  }, 15000);
</script>

</body>
</html>
