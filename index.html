<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TravelTrack</title>

  <link rel="stylesheet" href="Front/leaflet.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0d12;
      --surface: #111620;
      --surface2: #1a2030;
      --border: rgba(255,255,255,.08);
      --border2: rgba(255,255,255,.14);
      --text: #e8edf5;
      --text-muted: #7a8499;
      --accent: #4d9fff;
      --accent-glow: rgba(77,159,255,.25);
      --gold: #f5c842;
      --gold-glow: rgba(245,200,66,.2);
      --green: #2dbe7c;
      --green-glow: rgba(45,190,124,.2);
      --red: #ff5a5a;
      --font-head: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --r: 14px;
      --r-sm: 8px;
    }

    html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); }
    #map { width: 100%; height: 100%; }

    /* ── Loading ─────────────────────────────────────────── */
    #loader {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px;
      font-family: var(--font-body);
    }
    .loader-icon {
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--surface2);
      border: 1px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      animation: float 2s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .loader-label {
      font-family: var(--font-head);
      font-size: 13px;
      letter-spacing: .08em;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    .loader-bar {
      width: 120px; height: 2px;
      background: var(--surface2);
      border-radius: 2px;
      overflow: hidden;
    }
    .loader-bar-fill {
      height: 100%; width: 40%;
      background: var(--accent);
      border-radius: 2px;
      animation: slide 1.4s ease-in-out infinite;
    }
    @keyframes slide {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }
    #loader.hidden { opacity: 0; transition: opacity .4s; pointer-events: none; }

    /* ── Leaflet overrides ───────────────────────────────── */
    .leaflet-zoom-animated { will-change: transform; }
    .leaflet-zoom-anim .leaflet-zoom-animated {
      transition: transform .25s cubic-bezier(0,0,.25,1) !important;
    }
    .leaflet-control-zoom { border: none !important; }
    .leaflet-control-zoom a {
      background: var(--surface) !important;
      color: var(--text) !important;
      border: 1px solid var(--border2) !important;
      border-radius: var(--r-sm) !important;
      margin-bottom: 4px !important;
      backdrop-filter: blur(10px);
      transition: background .15s !important;
      font-family: var(--font-body) !important;
    }
    .leaflet-control-zoom a:hover { background: var(--surface2) !important; }
    .leaflet-control-attribution {
      background: rgba(10,13,18,.75) !important;
      color: var(--text-muted) !important;
      font-size: .6rem !important;
      border-radius: 8px 0 0 0 !important;
      font-family: var(--font-body) !important;
    }
    .leaflet-control-attribution a { color: var(--accent) !important; }
    .leaflet-popup-content-wrapper {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: var(--r) !important;
      color: var(--text);
      box-shadow: 0 16px 48px rgba(0,0,0,.6);
      font-family: var(--font-body);
    }
    .leaflet-popup-tip { background: var(--surface); }
    .leaflet-popup-content { margin: 14px 18px; font-size: .875rem; }

    /* ── HUD : XP bar ────────────────────────────────────── */
    #hud {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      z-index: 1000;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 40px;
      padding: 8px 18px;
      display: flex; align-items: center; gap: 14px;
      backdrop-filter: blur(12px);
      font-family: var(--font-body);
      min-width: 220px;
      box-shadow: 0 4px 24px rgba(0,0,0,.4);
      opacity: 0; transition: opacity .4s;
    }
    #hud.visible { opacity: 1; }
    .hud-logo {
      font-family: var(--font-head);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .04em;
      color: var(--text);
    }
    .hud-divider { width: 1px; height: 18px; background: var(--border2); }
    .hud-xp-wrap { display: flex; flex-direction: column; gap: 3px; flex: 1; }
    .hud-xp-label {
      font-size: 10px; font-weight: 500;
      color: var(--gold); letter-spacing: .06em;
      text-transform: uppercase;
    }
    .hud-xp-bar {
      height: 4px; border-radius: 4px;
      background: var(--surface2);
      overflow: hidden;
    }
    .hud-xp-fill {
      height: 100%; background: var(--gold);
      border-radius: 4px;
      transition: width .6s cubic-bezier(.4,0,.2,1);
    }
    .hud-xp-count {
      font-size: 11px; font-weight: 500; color: var(--text-muted);
    }

    /* ── Quest toggle button ─────────────────────────────── */
    #questBtn {
      position: fixed; bottom: 28px; right: 20px; z-index: 1000;
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--accent);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      box-shadow: 0 4px 20px var(--accent-glow), 0 2px 8px rgba(0,0,0,.4);
      transition: transform .15s, box-shadow .15s;
      opacity: 0;
    }
    #questBtn.visible { opacity: 1; transition: opacity .4s, transform .15s, box-shadow .15s; }
    #questBtn:hover { transform: scale(1.08); box-shadow: 0 6px 28px var(--accent-glow); }
    #questBtn:active { transform: scale(.96); }
    .quest-badge {
      position: absolute; top: -2px; right: -2px;
      width: 18px; height: 18px; border-radius: 50%;
      background: var(--red);
      font-family: var(--font-body);
      font-size: 10px; font-weight: 700;
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      border: 2px solid var(--bg);
    }

    /* ── Quest drawer ────────────────────────────────────── */
    #questDrawer {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 2000;
      background: var(--surface);
      border-top: 1px solid var(--border2);
      border-radius: 20px 20px 0 0;
      padding: 0 0 env(safe-area-inset-bottom, 0);
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.4,0,.2,1);
      max-height: 80vh;
      display: flex; flex-direction: column;
    }
    #questDrawer.open { transform: translateY(0); }
    .drawer-handle {
      width: 36px; height: 4px; border-radius: 4px;
      background: var(--border2);
      margin: 12px auto 0;
      flex-shrink: 0;
    }
    .drawer-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px 12px;
      flex-shrink: 0;
    }
    .drawer-title {
      font-family: var(--font-head);
      font-size: 17px; font-weight: 700;
      color: var(--text);
    }
    .drawer-close {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }
    .drawer-scroll {
      overflow-y: auto;
      padding: 0 16px 24px;
      flex: 1;
    }
    .drawer-scroll::-webkit-scrollbar { display: none; }

    /* ── Quest cards ─────────────────────────────────────── */
    .quest-card {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      margin-bottom: 10px;
      cursor: pointer;
      transition: border-color .15s, transform .1s;
    }
    .quest-card:hover { border-color: var(--border2); transform: translateY(-1px); }
    .quest-card.in-range { border-color: var(--green); box-shadow: 0 0 0 1px var(--green-glow); }
    .quest-card.done { opacity: .45; }
    .quest-icon-wrap {
      width: 44px; height: 44px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .quest-meta { flex: 1; min-width: 0; }
    .quest-name {
      font-family: var(--font-head);
      font-size: 14px; font-weight: 700;
      color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .quest-place {
      font-size: 12px; color: var(--text-muted);
      margin-top: 2px;
    }
    .quest-pill {
      font-size: 11px; font-weight: 500;
      padding: 4px 10px; border-radius: 20px;
      white-space: nowrap; flex-shrink: 0;
    }
    .pill-range { background: var(--green-glow); color: var(--green); }
    .pill-far { background: rgba(255,255,255,.06); color: var(--text-muted); }
    .pill-done { background: rgba(255,255,255,.04); color: var(--text-muted); }

    /* ── Quest detail panel ──────────────────────────────── */
    #questDetail {
      position: fixed; inset: 0; z-index: 3000;
      display: flex; align-items: flex-end;
      background: rgba(0,0,0,.5);
      opacity: 0; pointer-events: none;
      transition: opacity .25s;
      backdrop-filter: blur(4px);
    }
    #questDetail.visible { opacity: 1; pointer-events: all; }
    .detail-sheet {
      width: 100%;
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      border-top: 1px solid var(--border2);
      padding: 20px 20px calc(env(safe-area-inset-bottom, 0px) + 20px);
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.4,0,.2,1);
    }
    #questDetail.visible .detail-sheet { transform: translateY(0); }
    .detail-header {
      display: flex; align-items: flex-start; gap: 14px;
      margin-bottom: 16px;
    }
    .detail-icon {
      width: 56px; height: 56px; border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; flex-shrink: 0;
    }
    .detail-info { flex: 1; }
    .detail-name {
      font-family: var(--font-head);
      font-size: 20px; font-weight: 700;
      color: var(--text); line-height: 1.2;
    }
    .detail-place { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
    .detail-xp {
      display: flex; align-items: center; gap: 6px;
      margin-top: 6px;
    }
    .detail-xp-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--gold);
    }
    .detail-xp-val {
      font-size: 13px; font-weight: 500; color: var(--gold);
    }
    .detail-desc {
      font-size: 14px; color: var(--text-muted);
      line-height: 1.6;
      padding: 14px;
      background: var(--surface2);
      border-radius: var(--r-sm);
      border: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .detail-status {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px;
      border-radius: var(--r-sm);
      margin-bottom: 14px;
      font-size: 13px; font-weight: 500;
    }
    .detail-status.in-range {
      background: var(--green-glow);
      color: var(--green);
      border: 1px solid rgba(45,190,124,.3);
    }
    .detail-status.out-range {
      background: rgba(255,255,255,.04);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .detail-btn {
      width: 100%; padding: 14px;
      border-radius: var(--r);
      border: none; cursor: pointer;
      font-family: var(--font-head);
      font-size: 15px; font-weight: 700;
      letter-spacing: .02em;
      transition: transform .1s, opacity .15s;
    }
    .detail-btn:active { transform: scale(.98); }
    .detail-btn.can-validate { background: var(--accent); color: #fff; }
    .detail-btn.cannot { background: var(--surface2); color: var(--text-muted); pointer-events: none; }
    .detail-btn.completed { background: rgba(45,190,124,.15); color: var(--green); pointer-events: none; }
    .detail-close {
      position: absolute; top: 20px; right: 20px;
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text-muted); font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }

    /* ── Toast notification ──────────────────────────────── */
    #toast {
      position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px);
      z-index: 9000;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 40px;
      padding: 10px 20px;
      display: flex; align-items: center; gap: 10px;
      font-family: var(--font-body);
      font-size: 14px; font-weight: 500;
      color: var(--text);
      opacity: 0; pointer-events: none;
      transition: opacity .25s, transform .25s;
      box-shadow: 0 4px 20px rgba(0,0,0,.4);
      white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Zone marker pulse ───────────────────────────────── */
    .zone-marker {
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,.7));
      transition: filter .2s;
    }
    .zone-marker.done { filter: grayscale(1) opacity(.4); }
  </style>
</head>
<body>

  <!-- Loading -->
  <div id="loader">
    <div class="loader-icon">🗺️</div>
    <span class="loader-label">Localisation en cours…</span>
    <div class="loader-bar"><div class="loader-bar-fill"></div></div>
  </div>

  <div id="map"></div>

  <!-- Geolocation Data Panel -->
  <div id="geoDataPanel" class="geo-panel hidden">
    <div class="geo-panel-title">📍 Données GPS</div>
    <div class="geo-row"><span class="geo-label">Latitude</span><strong id="geoLat">—</strong></div>
    <div class="geo-row"><span class="geo-label">Longitude</span><strong id="geoLng">—</strong></div>
    <div class="geo-row"><span class="geo-label">Précision</span><strong id="geoAcc">—</strong></div>
    <div class="geo-row"><span class="geo-label">Altitude</span><strong id="geoAlt">—</strong></div>
    <div class="geo-row"><span class="geo-label">Vitesse</span><strong id="geoSpd">—</strong></div>
  </div>

  <!-- HUD -->
  <div id="hud">
    <span class="hud-logo">TravelTrack</span>
    <div class="hud-divider"></div>
    <div class="hud-xp-wrap">
      <span class="hud-xp-label">XP <span id="xpCount">0</span></span>
      <div class="hud-xp-bar"><div class="hud-xp-fill" id="xpFill" style="width:0%"></div></div>
    </div>
  </div>

  <!-- Quest button -->
  <button id="questBtn" onclick="toggleDrawer()">
    🧭
    <span class="quest-badge" id="questBadge">0</span>
  </button>

  <!-- Quest drawer -->
  <div id="questDrawer">
    <div class="drawer-handle"></div>
    <div class="drawer-head">
      <span class="drawer-title">Quêtes</span>
      <div class="drawer-close" onclick="toggleDrawer()">✕</div>
    </div>
    <div class="drawer-scroll" id="drawerScroll"></div>
  </div>

  <!-- Quest detail panel -->
  <div id="questDetail" onclick="closeDetail(event)">
    <div class="detail-sheet" style="position:relative;">
      <div class="detail-close" onclick="closeDetail()">✕</div>
      <div class="detail-header">
        <div class="detail-icon" id="dIcon"></div>
        <div class="detail-info">
          <div class="detail-name" id="dName"></div>
          <div class="detail-place" id="dPlace"></div>
          <div class="detail-xp">
            <div class="detail-xp-dot"></div>
            <span class="detail-xp-val" id="dXp"></span>
          </div>
        </div>
      </div>
      <div class="detail-desc" id="dDesc"></div>
      <div class="detail-status" id="dStatus"></div>
      <button class="detail-btn" id="dBtn" onclick="validateCurrent()"></button>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <script src="Front/leaflet.js"></script>
  <script src="quests.js"></script>
  <script>
    /* ── Leaflet icon fix ───────────────────────────────── */
    L.Icon.Default.prototype.options.iconUrl       = 'Front/images/marker-icon.png';
    L.Icon.Default.prototype.options.iconRetinaUrl = 'Front/images/marker-icon-2x.png';
    L.Icon.Default.prototype.options.shadowUrl     = 'Front/images/marker-shadow.png';
    delete L.Icon.Default.prototype._getIconUrl;

    /* ── State ──────────────────────────────────────────── */
    let userLatLng   = null;
    let currentQuestId = null;
    let drawerOpen   = false;
    const XP_MAX     = 500;

    const completedIds = new Set(
      JSON.parse(localStorage.getItem('tt_completed') || '[]')
    );
    let totalXp = JSON.parse(localStorage.getItem('tt_xp') || '0');

    /* ── Map init ───────────────────────────────────────── */
    const map = L.map('map', {
      center: [20, 0], zoom: 2,
      zoomAnimation: true, zoomAnimationThreshold: 4,
      fadeAnimation: true, markerZoomAnimation: true,
      zoomSnap: 1, zoomDelta: 1,
      wheelPxPerZoomLevel: 120,
      preferCanvas: true,
    });

    const tileLayer = L.tileLayer(
      'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
      {
        attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
        subdomains: 'abcd', maxZoom: 19,
        keepBuffer: 6, updateWhenZooming: false,
      }
    ).addTo(map);

    /* ── Loader ─────────────────────────────────────────── */
    const loader = document.getElementById('loader');
    function hideLoader() {
      loader.classList.add('hidden');
      setTimeout(() => loader.remove(), 500);
      document.getElementById('hud').classList.add('visible');
      document.getElementById('questBtn').classList.add('visible');
    }

    /* ── Geolocation ────────────────────────────────────── */
    function placeMe(pos) {
      const { latitude: lat, longitude: lng, accuracy, altitude, speed } = pos.coords;
      
      userLatLng = L.latLng(lat, lng);
      map.flyTo([lat, lng], 15, { duration: 1.8 });

      if (accuracy && accuracy < 5000) {
        L.circle([lat, lng], {
          radius: accuracy,
          color: '#4d9fff', fillColor: '#4d9fff',
          fillOpacity: .07, weight: 1, opacity: .5,
        }).addTo(map);
      }

      const youIcon = L.divIcon({
        className: '',
        html: `<div style="
          width:18px;height:18px;border-radius:50%;
          background:#4d9fff;border:3px solid #fff;
          box-shadow:0 0 0 6px rgba(77,159,255,.3),0 2px 12px rgba(0,0,0,.6);
        "></div>`,
        iconSize: [18, 18], iconAnchor: [9, 9],
      });

      L.marker([lat, lng], { icon: youIcon })
        .addTo(map)
        .bindPopup('<strong>📍 Vous êtes ici</strong>');

      renderQuestZones();
      updateHUD();
      updateBadge();

      // Mettre à jour le panneau de géolocalisation
      document.getElementById('geoLat').textContent = lat.toFixed(5) + '°';
      document.getElementById('geoLng').textContent = lng.toFixed(5) + '°';
      document.getElementById('geoAcc').textContent = '±' + Math.round(accuracy) + ' m';
      document.getElementById('geoAlt').textContent = (altitude != null) ? Math.round(altitude) + ' m' : 'N/A';
      document.getElementById('geoSpd').textContent = (speed != null) ? (speed * 3.6).toFixed(1) + ' km/h' : 'N/A';
      document.getElementById('geoDataPanel').classList.remove('hidden');

      hideLoader();
    }

    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        p => placeMe(p),
        _err => {
          loader.querySelector('.loader-label').textContent = 'Localisation indisponible';
          setTimeout(() => {
            renderQuestZones();
            updateHUD();
            updateBadge();
            hideLoader();
          }, 1400);
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    } else {
      setTimeout(hideLoader, 1200);
    }

    /* ── Quest zones on map ─────────────────────────────── */
    const questLayers = [];

    function renderQuestZones() {
      questLayers.forEach(l => map.removeLayer(l));
      questLayers.length = 0;

      QUESTS.forEach(q => {
        const done = completedIds.has(q.id);

        const circle = L.circle(q.latlng, {
          radius: q.radiusMeters,
          color: q.color,
          fillColor: q.color,
          fillOpacity: done ? .04 : .13,
          weight: done ? 1 : 2,
          opacity: done ? .25 : .75,
          dashArray: done ? '6 5' : null,
          interactive: true,
        }).addTo(map);

        circle.on('click', () => openDetail(q.id));
        questLayers.push(circle);

        const icon = L.divIcon({
          className: '',
          html: `<div class="zone-marker${done ? ' done' : ''}">${q.icon}</div>`,
          iconSize: [32, 32], iconAnchor: [16, 16],
        });

        const marker = L.marker(q.latlng, { icon, zIndexOffset: 100 })
          .addTo(map)
          .on('click', () => openDetail(q.id));

        questLayers.push(marker);
      });
    }

    /* ── Helpers ────────────────────────────────────────── */
    function getDistance(q) {
      if (!userLatLng) return Infinity;
      return userLatLng.distanceTo(L.latLng(q.latlng));
    }

    function isInRange(q) {
      return getDistance(q) <= q.radiusMeters;
    }

    function fmtDist(m) {
      return m < 1000 ? `${Math.round(m)} m` : `${(m / 1000).toFixed(1)} km`;
    }

    /* ── HUD ────────────────────────────────────────────── */
    function updateHUD() {
      const pct = Math.min(100, (totalXp / XP_MAX) * 100);
      document.getElementById('xpFill').style.width = pct + '%';
      document.getElementById('xpCount').textContent = totalXp;
    }

    /* ── Badge ──────────────────────────────────────────── */
    function updateBadge() {
      const avail = QUESTS.filter(q => !completedIds.has(q.id)).length;
      const badge = document.getElementById('questBadge');
      badge.textContent = avail;
      badge.style.display = avail > 0 ? 'flex' : 'none';
    }

    /* ── Drawer ─────────────────────────────────────────── */
    function toggleDrawer() {
      drawerOpen = !drawerOpen;
      document.getElementById('questDrawer').classList.toggle('open', drawerOpen);
      if (drawerOpen) renderDrawer();
    }

    function renderDrawer() {
      const scroll = document.getElementById('drawerScroll');
      const sorted = [...QUESTS].sort((a, b) => {
        const aDone = completedIds.has(a.id), bDone = completedIds.has(b.id);
        if (aDone !== bDone) return aDone - bDone;
        return getDistance(a) - getDistance(b);
      });

      scroll.innerHTML = sorted.map(q => {
        const done  = completedIds.has(q.id);
        const range = isInRange(q);
        const dist  = getDistance(q);

        let pillClass = 'pill-far';
        let pillText  = dist === Infinity ? '? m' : fmtDist(dist);
        if (done)  { pillClass = 'pill-done'; pillText = 'Faite ✓'; }
        if (range && !done) { pillClass = 'pill-range'; pillText = 'Dans la zone'; }

        return `<div class="quest-card${range && !done ? ' in-range' : ''}${done ? ' done' : ''}"
          onclick="openDetail(${q.id})">
          <div class="quest-icon-wrap" style="background:${q.color}22;">${q.icon}</div>
          <div class="quest-meta">
            <div class="quest-name">${q.name}</div>
            <div class="quest-place">${q.place} · ${q.xp} XP</div>
          </div>
          <span class="quest-pill ${pillClass}">${pillText}</span>
        </div>`;
      }).join('');
    }

    /* ── Detail panel ───────────────────────────────────── */
    function openDetail(id) {
      const q = QUESTS.find(x => x.id === id);
      if (!q) return;
      currentQuestId = id;

      const done  = completedIds.has(id);
      const range = isInRange(q);
      const dist  = getDistance(q);

      document.getElementById('dIcon').textContent  = q.icon;
      document.getElementById('dIcon').style.background = q.color + '22';
      document.getElementById('dName').textContent  = q.name;
      document.getElementById('dPlace').textContent = q.place + ' · ' + q.category;
      document.getElementById('dXp').textContent    = q.xp + ' XP';
      document.getElementById('dDesc').textContent  = q.desc;

      const status = document.getElementById('dStatus');
      const btn    = document.getElementById('dBtn');

      if (done) {
        status.className   = 'detail-status in-range';
        status.innerHTML   = '✓ Quête complétée';
        btn.className      = 'detail-btn completed';
        btn.textContent    = 'Déjà validée ✓';
      } else if (range) {
        status.className   = 'detail-status in-range';
        status.innerHTML   = '📍 Vous êtes dans la zone !';
        btn.className      = 'detail-btn can-validate';
        btn.textContent    = 'Valider la quête';
      } else {
        const d = dist === Infinity ? '?' : fmtDist(dist);
        status.className   = 'detail-status out-range';
        status.innerHTML   = `🗺️ À ${d} de la zone`;
        btn.className      = 'detail-btn cannot';
        btn.textContent    = 'Trop loin pour valider';
      }

      document.getElementById('questDetail').classList.add('visible');

      if (userLatLng) {
        map.flyTo(q.latlng, 15, { duration: 1.2 });
      }
    }

    function closeDetail(e) {
      if (e && e.target !== document.getElementById('questDetail')) return;
      document.getElementById('questDetail').classList.remove('visible');
      currentQuestId = null;
    }

    /* ── Validate ───────────────────────────────────────── */
    function validateCurrent() {
      if (currentQuestId === null) return;
      const q = QUESTS.find(x => x.id === currentQuestId);
      if (!q || completedIds.has(q.id) || !isInRange(q)) return;

      completedIds.add(q.id);
      totalXp += q.xp;

      localStorage.setItem('tt_completed', JSON.stringify([...completedIds]));
      localStorage.setItem('tt_xp', JSON.stringify(totalXp));

      document.getElementById('questDetail').classList.remove('visible');
      currentQuestId = null;

      renderQuestZones();
      updateHUD();
      updateBadge();
      if (drawerOpen) renderDrawer();

      showToast('🏅 ' + q.name + ' — +' + q.xp + ' XP !');
    }

    /* ── Toast ──────────────────────────────────────────── */
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
