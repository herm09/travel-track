<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TravelTrack — Map</title>
  <meta name="description" content="Interactive travel map powered by Leaflet.js — explore and track your journeys around the world.">

  <!-- Leaflet CSS (local) -->
  <link rel="stylesheet" href="../Front/leaflet.css">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ─── Design Tokens ─────────────────────────────────── */
    :root {
      --bg:          #0d1117;
      --surface:     #161b22;
      --surface2:    #21262d;
      --border:      #30363d;
      --accent:      #3fb950;
      --accent2:     #58a6ff;
      --accent3:     #f78166;
      --text:        #e6edf3;
      --text-muted:  #8b949e;
      --radius:      12px;
      --shadow:      0 8px 32px rgba(0,0,0,.45);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ─── Header ────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 60px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 1000;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    .logo span { color: var(--accent); }

    nav { display: flex; gap: 8px; }

    nav a {
      text-decoration: none;
      color: var(--text-muted);
      font-size: 0.9rem;
      padding: 6px 14px;
      border-radius: 8px;
      transition: all .2s;
    }
    nav a:hover { background: var(--surface2); color: var(--text); }
    nav a.active { background: rgba(63,185,80,.15); color: var(--accent); }

    /* ─── Layout ────────────────────────────────────────── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ─── Sidebar ───────────────────────────────────────── */
    .sidebar {
      width: 300px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }

    .sidebar-section {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-section h3 {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    /* Search */
    .search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      transition: border-color .2s;
    }
    .search-box:focus-within { border-color: var(--accent2); }
    .search-box input {
      background: none; border: none; outline: none;
      color: var(--text); font-family: inherit; font-size: 0.9rem;
      flex: 1;
    }
    .search-box input::placeholder { color: var(--text-muted); }
    .search-icon { color: var(--text-muted); font-size: 14px; }

    /* Map style picker */
    .style-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    }
    .style-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 8px;
      cursor: pointer;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 0.8rem;
      text-align: center;
      transition: all .2s;
    }
    .style-btn:hover { border-color: var(--accent2); color: var(--text); }
    .style-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(63,185,80,.08); }
    .style-btn .style-icon { font-size: 18px; display: block; margin-bottom: 4px; }

    /* Waypoints list */
    .waypoints-list { display: flex; flex-direction: column; gap: 6px; overflow-y: auto; padding: 16px; flex: 1; }

    .waypoint-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: all .2s;
    }
    .waypoint-card:hover { border-color: var(--accent2); transform: translateX(2px); }

    .waypoint-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }

    .waypoint-info { flex: 1; min-width: 0; }
    .waypoint-name { font-size: 0.9rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .waypoint-coords { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }

    /* Stats */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .stat-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }
    .stat-value { font-size: 1.4rem; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }

    /* ─── Map container ─────────────────────────────────── */
    #map {
      flex: 1;
      background: #1a1f29;
    }

    /* ─── Smooth zoom ───────────────────────────────────── */
    .leaflet-zoom-animated { will-change: transform; }
    .leaflet-tile-container { will-change: transform; }
    .leaflet-zoom-anim .leaflet-zoom-animated {
      transition: transform 0.25s cubic-bezier(0,0,0.25,1) !important;
    }

    /* ─── Leaflet overrides ─────────────────────────────── */
    .leaflet-container { font-family: 'Outfit', sans-serif; }

    .leaflet-popup-content-wrapper {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      color: var(--text);
    }
    .leaflet-popup-tip { background: var(--surface); }
    .leaflet-popup-content { margin: 14px 18px; }

    .popup-title { font-size: 1rem; font-weight: 600; margin-bottom: 4px; }
    .popup-sub { font-size: 0.8rem; color: var(--text-muted); }
    .popup-tag {
      display: inline-block;
      margin-top: 8px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .leaflet-control-zoom {
      border: 1px solid var(--border) !important;
      border-radius: 8px !important;
      overflow: hidden;
    }
    .leaflet-control-zoom a {
      background: var(--surface) !important;
      color: var(--text) !important;
      border-bottom: 1px solid var(--border) !important;
    }
    .leaflet-control-zoom a:hover { background: var(--surface2) !important; }

    .leaflet-control-attribution {
      background: rgba(13,17,23,.75) !important;
      color: var(--text-muted) !important;
      font-size: 0.65rem !important;
    }
    .leaflet-control-attribution a { color: var(--accent2) !important; }

    /* ─── Floating action button ────────────────────────── */
    .fab {
      position: absolute;
      bottom: 28px; right: 28px;
      z-index: 999;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 50%;
      width: 52px; height: 52px;
      font-size: 22px;
      cursor: pointer; color: #fff;
      box-shadow: 0 4px 20px rgba(63,185,80,.4);
      transition: transform .2s, box-shadow .2s;
      display: flex; align-items: center; justify-content: center;
    }
    .fab:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(63,185,80,.6); }

    /* ─── Toast ─────────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 90px; right: 28px; z-index: 2000;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 0.88rem;
      box-shadow: var(--shadow);
      transform: translateY(20px); opacity: 0;
      transition: all .3s cubic-bezier(.34,1.56,.64,1);
      pointer-events: none;
    }
    .toast.show { transform: translateY(0); opacity: 1; }

    /* ─── Responsive ────────────────────────────────────── */
    @media (max-width: 700px) {
      .sidebar { width: 100%; height: 240px; border-right: none; border-bottom: 1px solid var(--border); }
      .layout { flex-direction: column; }
    }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────── -->
<header>
  <div class="logo">
    <div class="logo-icon">✈️</div>
    Travel<span>Track</span>
  </div>
  <nav>
    <a href="../index.html">Home</a>
    <a href="#" class="active">Map</a>
  </nav>
</header>

<!-- ── Layout ──────────────────────────────────────────── -->
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">

    <!-- Search -->
    <div class="sidebar-section">
      <h3>Search</h3>
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="City, country…">
      </div>
    </div>

    <!-- Map Style -->
    <div class="sidebar-section">
      <h3>Map Style</h3>
      <div class="style-grid">
        <button class="style-btn active" id="btn-standard" onclick="setStyle('standard')">
          <span class="style-icon">🌙</span>Dark
        </button>
        <button class="style-btn" id="btn-satellite" onclick="setStyle('satellite')">
          <span class="style-icon">🛰️</span>Satellite
        </button>
        <button class="style-btn" id="btn-topo" onclick="setStyle('topo')">
          <span class="style-icon">⛰️</span>Topo
        </button>
        <button class="style-btn" id="btn-light" onclick="setStyle('light')">
          <span class="style-icon">☀️</span>Light
        </button>
      </div>
    </div>

    <!-- Stats -->
    <div class="sidebar-section">
      <h3>Stats</h3>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="stat-places">7</div>
          <div class="stat-label">Places</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-countries">5</div>
          <div class="stat-label">Countries</div>
        </div>
      </div>
    </div>

    <!-- Waypoints -->
    <div class="sidebar-section" style="border-bottom:none;padding-bottom:4px">
      <h3>Waypoints</h3>
    </div>
    <div class="waypoints-list" id="waypointsList"></div>

  </aside>

  <!-- Map -->
  <div style="position:relative;flex:1;">
    <div id="map"></div>
    <button class="fab" id="locateBtn" title="Go to my location">📍</button>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Leaflet JS (local) -->
<script src="../Front/leaflet.js"></script>

<script>
/* ─── Tile layers ────────────────────────────────────── */
/* Fix default marker image paths for local install */
L.Icon.Default.prototype.options.iconUrl      = '../Front/images/marker-icon.png';
L.Icon.Default.prototype.options.iconRetinaUrl = '../Front/images/marker-icon-2x.png';
L.Icon.Default.prototype.options.shadowUrl    = '../Front/images/marker-shadow.png';
delete L.Icon.Default.prototype._getIconUrl;

const tileOpts = { keepBuffer: 6, updateWhenZooming: false };

const tiles = {
  standard: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd', maxZoom: 19, ...tileOpts
  }),
  satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: '&copy; Esri', ...tileOpts
  }),
  topo: L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://opentopomap.org">OpenTopoMap</a>',
    subdomains: 'abc', maxZoom: 17, ...tileOpts
  }),
  light: L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd', maxZoom: 19, ...tileOpts
  })
};

/* ─── Map init ───────────────────────────────────────── */
const map = L.map('map', {
  center: [20, 0],
  zoom: 2,
  layers: [tiles.standard],
  zoomControl: true,
  zoomAnimation: true,
  zoomAnimationThreshold: 4,
  fadeAnimation: true,
  markerZoomAnimation: true,
  zoomSnap: 1,
  zoomDelta: 1,
  wheelPxPerZoomLevel: 120,
  preferCanvas: true
});

let currentTile = 'standard';

/* ─── Waypoints data ─────────────────────────────────── */
const waypoints = [
  { name: 'Paris',       country: 'France',      lat: 48.8566,   lng:   2.3522,  type: 'visited',  color: '#3fb950', tag: '✅ Visited'    },
  { name: 'Tokyo',       country: 'Japan',        lat: 35.6762,   lng: 139.6503,  type: 'visited',  color: '#3fb950', tag: '✅ Visited'    },
  { name: 'New York',    country: 'USA',          lat: 40.7128,   lng: -74.006,   type: 'visited',  color: '#3fb950', tag: '✅ Visited'    },
  { name: 'Sydney',      country: 'Australia',    lat: -33.8688,  lng: 151.2093,  type: 'wishlist', color: '#f78166', tag: '🎯 Wishlist'   },
  { name: 'Cairo',       country: 'Egypt',        lat: 30.0444,   lng:  31.2357,  type: 'wishlist', color: '#f78166', tag: '🎯 Wishlist'   },
  { name: 'Rio de Janeiro', country: 'Brazil',   lat: -22.9068,  lng: -43.1729,  type: 'wishlist', color: '#f78166', tag: '🎯 Wishlist'   },
  { name: 'Reykjavik',   country: 'Iceland',      lat: 64.1355,   lng: -21.8954,  type: 'current',  color: '#58a6ff', tag: '📍 Current'    },
];

/* ─── Custom marker ──────────────────────────────────── */
function makeIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div style="
      width:18px; height:18px; border-radius:50%;
      background:${color};
      border:2px solid rgba(255,255,255,.25);
      box-shadow: 0 0 0 4px ${color}33, 0 2px 10px rgba(0,0,0,.5);
    "></div>`,
    iconSize: [18, 18],
    iconAnchor: [9, 9]
  });
}

/* ─── Add markers + sidebar cards ───────────────────── */
const waypointsList = document.getElementById('waypointsList');

waypoints.forEach((wp, idx) => {
  const marker = L.marker([wp.lat, wp.lng], { icon: makeIcon(wp.color) }).addTo(map);

  marker.bindPopup(`
    <div class="popup-title">${wp.name}</div>
    <div class="popup-sub">📍 ${wp.country}</div>
    <div class="popup-sub" style="margin-top:4px">
      ${wp.lat.toFixed(4)}°, ${wp.lng.toFixed(4)}°
    </div>
    <span class="popup-tag" style="background:${wp.color}22;color:${wp.color}">${wp.tag}</span>
  `);

  // Sidebar card
  const card = document.createElement('div');
  card.className = 'waypoint-card';
  card.innerHTML = `
    <div class="waypoint-dot" style="background:${wp.color}"></div>
    <div class="waypoint-info">
      <div class="waypoint-name">${wp.name}</div>
      <div class="waypoint-coords">${wp.country} · ${wp.lat.toFixed(2)}°, ${wp.lng.toFixed(2)}°</div>
    </div>
  `;
  card.addEventListener('click', () => {
    map.flyTo([wp.lat, wp.lng], 6, { duration: 1.2 });
    setTimeout(() => marker.openPopup(), 1300);
  });
  waypointsList.appendChild(card);
});

/* ─── Map style switcher ─────────────────────────────── */
function setStyle(name) {
  if (name === currentTile) return;
  map.removeLayer(tiles[currentTile]);
  map.addLayer(tiles[name]);
  tiles[name].bringToBack();
  currentTile = name;

  document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + name).classList.add('active');
  showToast(`Map style: ${name.charAt(0).toUpperCase() + name.slice(1)}`);
}

/* ─── Geolocation ────────────────────────────────────── */
document.getElementById('locateBtn').addEventListener('click', () => {
  if (!navigator.geolocation) { showToast('Geolocation not supported'); return; }
  showToast('Locating you…');
  navigator.geolocation.getCurrentPosition(pos => {
    const { latitude: lat, longitude: lng } = pos.coords;
    map.flyTo([lat, lng], 10, { duration: 1.5 });
    L.circleMarker([lat, lng], {
      radius: 8, color: '#58a6ff', fillColor: '#58a6ff',
      fillOpacity: 0.8, weight: 2
    }).addTo(map).bindPopup('📍 You are here').openPopup();
    showToast('Found your location!');
  }, () => showToast('Could not get location'));
});

/* ─── Simple search ──────────────────────────────────── */
document.getElementById('searchInput').addEventListener('input', function () {
  const q = this.value.toLowerCase().trim();
  if (!q) return;
  const match = waypoints.find(wp => wp.name.toLowerCase().includes(q) || wp.country.toLowerCase().includes(q));
  if (match) {
    map.flyTo([match.lat, match.lng], 6, { duration: 1.2 });
    showToast(`Flying to ${match.name}`);
  }
});

/* ─── Toast helper ───────────────────────────────────── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
